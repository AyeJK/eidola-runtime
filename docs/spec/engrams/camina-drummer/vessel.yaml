# Camina Drummer — Vessel configuration
# v2 adds the Three.js renderer pack alongside the legacy Lottie pack.
# The overlay selects the active pack based on renderer capability:
#   - shrine / widget with Three.js support → camina-v3-threejs (component renderer)
#   - fallback / legacy → camina-shrine (lottie renderer)

# ─── Active renderer ───────────────────────────────────────────────────────────
type: component
pack: camina-v3-threejs

# State → pose mapping is internal to CaminaVesselRenderer.
states:
  - idle
  - thinking
  - waiting
  - working
  - searching
  - writing
  - responding
  - success
  - error
  - attention

# Idle variants (handled internally, cycle every idle_cycle_ms)
idle_variants:
  - breathe
  - console_check
  - belt_watch
  - weight_shift
  - horizon_scan
idle_cycle_ms: 9000

# ─── Transition overrides ─────────────────────────────────────────────────────
transitions:
  default:
    type: crossfade
    duration_ms: 300

  overrides:
    - from: "*"
      to: attention
      type: cut
      duration_ms: 0
    - from: attention
      to: idle
      type: fast
      duration_ms: 150
    - from: attention
      to: responding
      type: fast
      duration_ms: 150
    - from: thinking
      to: working
      type: fast
      duration_ms: 180
    - from: working
      to: responding
      type: default
      duration_ms: 350
    - from: idle
      to: idle
      type: slow
      duration_ms: 600

# ─── Playback config ──────────────────────────────────────────────────────────
playback:
  idle_loops: true
  approval_idle_ms: 3000
  success_hold_ms: 4000

# ─── Legacy fallback ──────────────────────────────────────────────────────────
fallback:
  type: lottie
  pack: camina-shrine
  expressions:
    idle: idle.json
    thinking: thinking.json
    waiting: waiting.json
    working: working.json
    searching: searching.json
    writing: writing.json
    responding: responding.json
    success: responding.json
    error: error.json
    attention: attention.json
  transitions:
    default: crossfade
    duration_ms: 600
  playback:
    idle_loops: true
    approval_idle_ms: 3000
